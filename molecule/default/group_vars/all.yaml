---
service_name: gaiad
network_name: "launcher"
download_root: "/tmp/molecule"
local_bin_path: "/usr/local/bin"
service_home: "/usr/local/{{ service_name }}"
check_flag: "{{ download_root }}/to-notify-verifier-that-converged-in-check-mode"
call_mode: "{{ lookup('ansible.builtin.env', 'ANSIBLE_CALL_MODE', default='split') }}"
regexp_line: '.+ committed state .+ height=\d{2,} .+'
mesv_pkgs:
  - name:
      - git
      - vim
      - lsof
      - nginx
      - rsync
    state: present
    update_cache: true
    install_recommends: false
mesv_groups:
  - name: "{{ service_name }}"
mesv_users:
  - name: "{{ service_name }}"
    group: "{{ service_name }}"
    home: "{{ service_home }}"
    shell: "/usr/sbin/nologin"
    password_expire_warn: 3
    create_home: false
meva_key2user:
  - user: "{{ service_name }}"
    key: "ssh-ed25519
      AAAAC3NzaC1lZDI1NTE5AAAAIGvDthv4Z9eqO2yljFz9rrZ8zibYPyNHrTKkbSR3FuuJ test"
mesv_dirs:
  - path: "{{ local_bin_path }}"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "{{ service_home | dirname }}"
    owner: "root"
    group: "root"
    mode: "0755"
  - path: "{{ service_home }}"
    owner: "{{ service_name }}"
    group: "{{ service_name }}"
    mode: "0700"
mesv_templates:
  - src: "templates/service-restricted.j2"
    dest: "/etc/systemd/system/{{ service_name }}.service"
    mode: "0440"
    force: "yes"
    vars:
      unit:
        Description: "Node {{ service_name }} service"
      service:
        Type: "simple"
        Restart: "always"
        User: "{{ service_name }}"
        Group: "{{ service_name }}"
        ReadWritePaths: "{{ service_home }}"
        WorkingDirectory: "{{ service_home }}"
        SyslogIdentifier: "{{ service_name }}"
        EnvironmentFile: "-/etc/default/{{ service_name }}"
        ExecStart: "{{ local_bin_path }}/{{ service_name }} --home={{ service_home }}
          start"
mesv_systemd:
  - name: "{{ service_name }}"
mesv_downloads:
  - url: "https://github.com/cosmos/gaia/releases/\
      download/v14.2.0/gaiad-v14.2.0-linux-amd64"
    dest: "{{ local_bin_path }}"
    creates: "{{ service_name }}"
    file_mode: "0755"
mesv_shell:
  - executable: /bin/bash
    cmd: "{{ local_bin_path }}/{{ service_name }} --home='{{ service_home }}' init -o
      --chain-id='{{ network_name }}' '{{ network_name }} validator'

      {{ local_bin_path }}/{{ service_name }} --home='{{ service_home }}' tendermint
      unsafe-reset-all"
mesv_downloads2config: |
  {%- set result = [] -%}
  {%- for f in ['priv_validator_key.json', 'genesis.json', 'config.toml'] -%}
    {%- do result.append({
      'url': 'https://github.com/raven428/ansible-mega-launch/releases' ~
        '/download/molecule-default/' ~ f,
      'dest': service_home ~ '/config',
      'owner': service_name,
      'group': service_name,
      'creates': f,
    }) -%}
  {%- endfor -%}
  {{ result }}
