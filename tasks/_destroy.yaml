---
- name: Destroy packages remove
  ansible.builtin.include_role:
    name: ansible-mega-var
    tasks_from: _apt.yaml
  loop_control:
    loop_var: i
  loop: "{{ mesv_install_pkgs | default([]) | map('combine', {'state': 'absent',
    'autoremove': true, 'purge': true}) | list }}"

- name: Destroy users keys
  ansible.builtin.include_role:
    name: ansible-mega-var
    tasks_from: _key.yaml
  loop_control:
    loop_var: i
  loop: "{{ mesv_install_key2user | default([]) | map('combine', {'state': 'absent'}) |
    list }}"

- name: Destroy users remove
  ansible.builtin.include_role:
    name: ansible-mega-var
    tasks_from: _user.yaml
  loop_control:
    loop_var: i
  loop: "{{ mesv_install_users | default([]) | map('combine', {'state': 'absent'}) |
    list }}"

- name: Destroy groups remove
  ansible.builtin.include_role:
    name: ansible-mega-var
    tasks_from: _group.yaml
  loop_control:
    loop_var: i
  loop: "{{ mesv_install_groups | default([]) | map('combine', {'state': 'absent'}) |
    list }}"

- name: Destroy dirs remove
  ansible.builtin.include_role:
    name: ansible-mega-var
    tasks_from: _file.yaml
  loop_control:
    loop_var: i
  loop: "{{ (mesv_install_templates | default([]) + mesv_config_templates |
    default([]) + mesv_remove_entries | default([])) | map(attribute='dest') |
    map('community.general.dict_kv', 'name') | map('combine', {'state': 'absent'}) |
    list }}"
